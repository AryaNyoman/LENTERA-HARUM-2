# Railway (Nixpacks) — fix build @tailwindcss/oxide "Cannot find native binding".
#
# Akar masalah: package-lock.json di-generate di Windows; `npm ci` MAUPUN
# `npm install` yang membaca lockfile itu melewati biner native per-platform
# @tailwindcss/oxide-linux-x64-gnu (bug npm optional-deps, npm/cli#4828),
# sehingga `next build` gagal di Linux.
#
# Solusi (persis anjuran pesan error): hapus package-lock.json DI KONTAINER BUILD
# saja lalu `npm install` segar → npm me-resolve biner untuk Linux dengan benar.
# Repo tetap menyimpan lockfile (reproducibility lokal tak terganggu).
# --include=dev memastikan devDependencies (next, tailwind, tsx) tetap terpasang.
[phases.install]
cmds = ['rm -f package-lock.json', 'npm install --include=dev']
